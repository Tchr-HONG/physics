<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물리학 가상 실험실</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 50px 20px;
            text-align: center;
        }
        header {
            margin-bottom: 50px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 1.2em;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background-color: white;
            border-radius: 15px;
            padding: 30px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 5px solid #3498db;
            text-align: left;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #2980b9;
            margin-top: 0;
            font-size: 1.5em;
        }
        .card p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        /* 준비 중인 카드 스타일 */
        .card.disabled {
            border-top: 5px solid #bdc3c7;
            cursor: not-allowed;
            background-color: #fdfdfd;
        }
        .card.disabled:hover {
            transform: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card.disabled h2 { color: #95a5a6; }
        
        .tag {
            display: inline-block;
            background-color: #e8f4f8;
            color: #3498db;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .card.disabled .tag {
            background-color: #f1f2f6;
            color: #a4b0be;
        }
    </style>
</head>
<body>

    <header>
        <h1>🔬 OOO 선생님의 물리 실험실</h1>
        <p class="subtitle">직접 조작하며 깨우치는 고등학교 물리 개념</p>
    </header>

    <div class="grid-container">
        <a href="torque/torque.html" class="card">
            <div>
                <h2>🔄 회전 운동과 돌림힘</h2>
                <p>막대에 작용하는 힘의 위치를 변화시켜보며, 물체의 회전 상태를 변화시키는 돌림힘(Torque)의 원리를 탐구합니다.</p>
            </div>
            <div>
                <span class="tag">역학적 상호작용</span>
            </div>
        </a>

        <a href="#" class="card disabled" onclick="event.preventDefault();">
            <div>
                <h2>⚖️ 무게중심과 역학적 평형</h2>
                <p>알짜힘과 알짜 돌림힘이 모두 0이 되는 조건을 찾아내어, 완벽한 균형을 이루는 모빌을 직접 설계해 봅니다.</p>
            </div>
            <div>
                <span class="tag">준비 중 🛠️</span>
            </div>
        </a>
        
        <a href="#" class="card disabled" onclick="event.preventDefault();">
            <div>
                <h2>🚀 다음 탐구 주제</h2>
                <p>선생님의 새로운 물리 시뮬레이션이 이곳에 업데이트될 예정입니다.</p>
            </div>
            <div>
                <span class="tag">Coming Soon</span>
            </div>
        </a>
    </div>

</body>
</html>
